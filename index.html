<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Big Money · Казино</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-dark: #0a0c0f;
            --bg-card: #14181f;
            --bg-element: #1e232c;
            --accent: #ffd966;
            --accent-glow: rgba(255, 217, 102, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #8f9bb3;
            --border-color: #2a313c;
            --success: #4caf50;
            --danger: #f44336;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        .app {
            max-width: 480px;
            width: 100%;
            background: rgba(10, 12, 15, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid rgba(255, 217, 102, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 217, 102, 0.05);
            position: relative;
            z-index: 1;
        }

        .app::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--accent), transparent, var(--accent));
            border-radius: 34px;
            opacity: 0.1;
            z-index: -1;
            animation: borderGlow 3s infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.2; }
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(20, 24, 31, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .back-btn:active {
            background: var(--bg-element);
            transform: scale(0.95);
        }

        .logo {
            font-weight: 700;
            font-size: 20px;
            text-shadow: 0 0 10px var(--accent);
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-element));
            padding: 8px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--accent);
            font-weight: 600;
            color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            animation: balancePulse 2s infinite;
            font-size: clamp(14px, 4vw, 16px);
        }

        @keyframes balancePulse {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50% { box-shadow: 0 0 30px var(--accent-glow); }
        }

        .balance span {
            color: white;
            font-weight: 500;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            padding: 4px 12px 4px 4px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            margin: 0 20px 16px 20px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ffaa33);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a0c10;
            font-weight: 700;
            font-size: 18px;
            animation: avatarPulse 2s infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .username {
            font-weight: 600;
            font-size: clamp(14px, 4vw, 16px);
        }

        .tabs {
            display: flex;
            padding: 0 20px 16px 20px;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            transition: all 0.3s;
            cursor: pointer;
            flex-shrink: 0;
        }

        .tab:active {
            transform: scale(0.95);
        }

        .tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #0a0c10;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .game-container {
            padding: 0 20px 20px 20px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .game-title {
            font-size: clamp(24px, 6vw, 28px);
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleGlow 2s infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 10px var(--accent-glow)); }
            50% { filter: drop-shadow(0 0 20px var(--accent-glow)); }
        }

        .game-desc {
            color: var(--text-secondary);
            font-size: clamp(12px, 3.5vw, 14px);
        }

        #crash-game, #mines-game, #baccarat-game, #roulette-game {
            display: none;
        }

        #crash-game.active, #mines-game.active, #baccarat-game.active, #roulette-game.active {
            display: block;
        }

        .canvas-container {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .canvas-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
            animation: scanline 3s infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .multiplier {
            font-size: clamp(48px, 12vw, 64px);
            font-weight: 900;
            text-align: center;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
            margin-bottom: 20px;
            animation: multiplierPulse 1s infinite;
        }

        @keyframes multiplierPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .multiplier small {
            font-size: clamp(24px, 6vw, 32px);
            color: var(--text-secondary);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-element);
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, #ffaa33 100%);
            width: 0%;
            transition: width 0.1s linear;
            position: relative;
            box-shadow: 0 0 20px var(--accent);
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 10px;
            height: 100%;
            background: white;
            filter: blur(5px);
            animation: progressGlow 1s infinite;
        }

        @keyframes progressGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .graph-container {
            position: relative;
            height: 120px;
            margin: 20px 0;
            overflow: hidden;
        }

        .graph-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--accent);
            stroke-width: 3;
            filter: drop-shadow(0 0 10px var(--accent));
            transition: d 0.1s linear;
        }

        .graph-point {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--accent);
            animation: pointPulse 1s infinite;
            transform: translate(-50%, -50%);
        }

        @keyframes pointPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.8; }
        }

        .auto-cashout {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-element);
            padding: 12px 16px;
            border-radius: 16px;
            margin: 16px 0;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }

        .auto-cashout:active {
            border-color: var(--accent);
            transform: scale(0.98);
        }

        .toggle-switch {
            width: 50px;
            height: 28px;
            background: var(--bg-card);
            border-radius: 40px;
            position: relative;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }

        .toggle-switch.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .toggle-switch.active::after {
            left: 24px;
            background: #0a0c10;
        }

        .bet-controls {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            align-items: center;
            flex-wrap: wrap;
        }

        .bet-input {
            flex: 1;
            min-width: 120px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 14px 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .bet-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .bet-multipliers {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .bet-mult {
            background: var(--bg-element);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .bet-mult:active {
            background: var(--accent);
            color: #0a0c10;
            transform: scale(0.95);
        }

        .play-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, #ffaa33 100%);
            border: none;
            color: #0a0c10;
            font-weight: 700;
            font-size: clamp(16px, 5vw, 18px);
            padding: 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 8px 0;
        }

        .play-btn:active {
            transform: scale(0.98);
            box-shadow: 0 0 30px var(--accent);
        }

        .play-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .play-btn.small {
            padding: 12px;
            font-size: 14px;
        }

        .mines-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 20px 0;
        }

        .mine-cell {
            aspect-ratio: 1;
            background: var(--bg-element);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(20px, 5vw, 24px);
            cursor: pointer;
            transition: all 0.3s;
        }

        .mine-cell::before {
            content: '?';
            color: var(--text-secondary);
            font-weight: 600;
            animation: questionBlink 1.5s infinite;
        }

        @keyframes questionBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .mine-cell:active {
            transform: scale(0.95);
            border-color: var(--accent);
        }

        .mine-cell.revealed {
            background: var(--bg-card);
            animation: revealCell 0.3s ease-out;
        }

        @keyframes revealCell {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .mine-cell.revealed::before {
            content: '●';
            color: var(--success);
            font-size: clamp(24px, 6vw, 32px);
            animation: gemPulse 1s infinite;
        }

        @keyframes gemPulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px var(--success); }
            50% { transform: scale(1.1); text-shadow: 0 0 20px var(--success); }
        }

        .mine-cell.mine::before {
            content: '💣';
            color: var(--danger);
            font-size: clamp(20px, 5vw, 24px);
            animation: bombShake 0.5s infinite;
        }

        @keyframes bombShake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        .mine-cell.mine.revealed {
            background: rgba(244, 67, 54, 0.2);
            animation: bombExplode 0.5s ease-out;
        }

        @keyframes bombExplode {
            0% { transform: scale(1); background: rgba(244, 67, 54, 0.2); }
            50% { transform: scale(1.2); background: rgba(244, 67, 54, 0.8); }
            100% { transform: scale(1); background: rgba(244, 67, 54, 0.2); }
        }

        .baccarat-history {
            display: flex;
            gap: 8px;
            margin: 16px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .history-item {
            width: 45px;
            height: 45px;
            background: var(--bg-element);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            animation: historyAppear 0.3s ease-out;
        }

        @keyframes historyAppear {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .history-item.player { background: var(--success); color: white; }
        .history-item.banker { background: var(--danger); color: white; }
        .history-item.tie { background: #ffaa00; color: black; }

        .bet-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .bet-option {
            background: var(--bg-element);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .bet-option:active {
            transform: scale(0.98);
            border-color: var(--accent);
        }

        .bet-option.selected {
            border-color: var(--accent);
            background: var(--accent-glow);
            animation: optionSelect 0.3s ease-out;
        }

        @keyframes optionSelect {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .bet-option .coeff {
            color: var(--accent);
            font-weight: 700;
            font-size: 20px;
            margin-top: 4px;
        }

        .roulette-wheel {
            position: relative;
            width: min(280px, 70vw);
            height: min(280px, 70vw);
            margin: 20px auto;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #f44336 0deg 18deg,
                #4caf50 18deg 36deg,
                #ffaa00 36deg 54deg,
                #2196f3 54deg 72deg,
                #9c27b0 72deg 90deg,
                #ff9800 90deg 108deg,
                #e91e63 108deg 126deg,
                #00bcd4 126deg 144deg,
                #8bc34a 144deg 162deg,
                #ffeb3b 162deg 180deg,
                #f44336 180deg 198deg,
                #4caf50 198deg 216deg,
                #ffaa00 216deg 234deg,
                #2196f3 234deg 252deg,
                #9c27b0 252deg 270deg,
                #ff9800 270deg 288deg,
                #e91e63 288deg 306deg,
                #00bcd4 306deg 324deg,
                #8bc34a 324deg 342deg,
                #ffeb3b 342deg 360deg
            );
            border: 3px solid var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            transition: transform 3s cubic-bezier(0.3, 0, 0.1, 1);
            position: relative;
        }

        .wheel::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            background: var(--bg-element);
            border-radius: 50%;
            border: 2px solid var(--accent);
            z-index: 2;
        }

        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid var(--accent);
            filter: drop-shadow(0 0 10px var(--accent));
            z-index: 3;
        }

        .roulette-number {
            position: absolute;
            width: 100%;
            text-align: center;
            bottom: -40px;
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
            animation: numberPop 0.5s ease-out;
        }

        @keyframes numberPop {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .roulette-bets {
            display: flex;
            gap: 12px;
            margin: 60px 0 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .roulette-bet {
            background: var(--bg-element);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .roulette-bet:active {
            background: var(--accent);
            color: #0a0c10;
            transform: scale(0.95);
        }

        .roulette-bet.selected {
            background: var(--accent);
            color: #0a0c10;
            border-color: var(--accent);
        }

        .chat-section {
            margin-top: 20px;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid var(--border-color);
        }

        .chat-messages {
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 12px;
            padding-right: 4px;
        }

        .chat-message {
            margin-bottom: 8px;
            padding: 10px 14px;
            background: var(--bg-element);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            animation: messageAppear 0.3s ease-out;
            border: 1px solid var(--border-color);
            font-size: 14px;
            word-break: break-word;
        }

        @keyframes messageAppear {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .chat-input {
            display: flex;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            background: var(--bg-element);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        .chat-input input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .chat-input button {
            background: linear-gradient(135deg, var(--accent) 0%, #ffaa33 100%);
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            color: #0a0c10;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .chat-input button:active {
            transform: scale(0.95);
        }

        .error-message {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid var(--danger);
            border-radius: 16px;
            padding: 12px;
            margin: 10px 0;
            color: var(--danger);
            text-align: center;
            animation: errorShake 0.5s;
            font-size: 14px;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .win-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, var(--accent), #ffaa33);
            color: #0a0c10;
            padding: 30px 40px;
            border-radius: 30px;
            font-size: clamp(32px, 8vw, 48px);
            font-weight: 900;
            z-index: 1000;
            animation: winPopup 1s forwards;
            box-shadow: 0 0 100px var(--accent);
            border: 2px solid white;
            white-space: nowrap;
        }

        @keyframes winPopup {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            top: -10px;
            animation: confettiFall 3s linear forwards;
            z-index: 999;
        }

        @keyframes confettiFall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 380px) {
            .app { border-radius: 24px; }
            .header { padding: 12px 16px; }
            .tabs { padding: 0 16px 12px 16px; }
            .game-container { padding: 0 16px 16px 16px; }
            .bet-mult { padding: 6px 12px; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="app">
        <div class="header">
            <div class="header-left">
                <button class="back-btn" onclick="window.history.back()">←</button>
                <span class="logo">BIG MONEY</span>
            </div>
            <div class="balance" id="balanceDisplay">
                <span>💰</span>
                <span id="balanceAmount">0.00</span>
            </div>
        </div>

        <div class="user-info" id="userInfo">
            <div class="avatar" id="userAvatar">👤</div>
            <span class="username" id="userName">Игрок</span>
        </div>

        <div class="tabs" id="gameTabs">
            <button class="tab active" data-game="crash">CRASH</button>
            <button class="tab" data-game="mines">MINES</button>
            <button class="tab" data-game="baccarat">BACCARAT</button>
            <button class="tab" data-game="roulette">Roulette</button>
        </div>

        <div class="game-container">
            <div id="crash-game" class="active">
                <div class="game-header">
                    <div>
                        <div class="game-title">CRASH</div>
                        <div class="game-desc" id="crashDesc">Лови момент и забирай</div>
                    </div>
                </div>

                <div class="canvas-container">
                    <div class="multiplier" id="crashMultiplier">1.00<small>x</small></div>
                    <div class="graph-container" id="graphContainer">
                        <svg class="graph-line" viewBox="0 0 400 120" preserveAspectRatio="none">
                            <path id="graphPath" d="M0 120 L400 120" stroke="var(--accent)" stroke-width="3" fill="none"/>
                        </svg>
                        <div class="graph-point" id="graphPoint" style="left: 0%; bottom: 0%;"></div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="crashProgress" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="auto-cashout">
                    <span>🎯 Автовывод</span>
                    <div class="toggle-switch" id="autoCashoutToggle"></div>
                </div>

                <div class="bet-controls">
                    <input type="number" class="bet-input" id="crashBet" value="10" min="1" step="1">
                    <div class="bet-multipliers">
                        <button class="bet-mult" data-mult="2">x2</button>
                        <button class="bet-mult" data-mult="5">x5</button>
                        <button class="bet-mult" data-mult="10">x10</button>
                    </div>
                </div>

                <div class="error-message hidden" id="crashError"></div>
                <button class="play-btn" id="crashPlayBtn">СТАВИТЬ</button>
            </div>

            <div id="mines-game">
                <div class="game-header">
                    <div>
                        <div class="game-title">MINES</div>
                        <div class="game-desc" id="minesDesc">5×5 поле • Алмазы и мины</div>
                    </div>
                </div>

                <div class="mines-grid" id="minesGrid"></div>

                <div class="bet-controls">
                    <input type="number" class="bet-input" id="minesBet" value="10" min="1" step="1">
                    <div class="bet-multipliers">
                        <button class="bet-mult" data-mult="2">x2</button>
                        <button class="bet-mult" data-mult="5">x5</button>
                        <button class="bet-mult" data-mult="10">x10</button>
                    </div>
                </div>

                <div class="error-message hidden" id="minesError"></div>
                <button class="play-btn" id="minesPlayBtn">СДЕЛАТЬ СТАВКУ</button>
                <button class="play-btn small hidden" id="minesCashoutBtn">💰 ЗАБРАТЬ ВЫИГРЫШ</button>
            </div>

            <div id="baccarat-game">
                <div class="game-header">
                    <div>
                        <div class="game-title">BACCARAT</div>
                        <div class="game-desc" id="baccaratDesc">Игрок vs Банкир</div>
                    </div>
                </div>

                <div class="baccarat-history" id="baccaratHistory"></div>

                <div class="bet-options" id="baccaratBets">
                    <div class="bet-option" data-bet="player" data-coeff="2">
                        <div>👤 Игрок</div>
                        <div class="coeff">x2</div>
                    </div>
                    <div class="bet-option" data-bet="banker" data-coeff="1.95">
                        <div>🏦 Банкир</div>
                        <div class="coeff">x1.95</div>
                    </div>
                    <div class="bet-option" data-bet="tie" data-coeff="8">
                        <div>🤝 Ничья</div>
                        <div class="coeff">x8</div>
                    </div>
                    <div class="bet-option" data-bet="playerPair" data-coeff="11">
                        <div>👥 Пара игрока</div>
                        <div class="coeff">x11</div>
                    </div>
                </div>

                <div class="bet-controls">
                    <input type="number" class="bet-input" id="baccaratBet" value="10" min="1" step="1">
                    <div class="bet-multipliers">
                        <button class="bet-mult" data-mult="2">x2</button>
                        <button class="bet-mult" data-mult="5">x5</button>
                        <button class="bet-mult" data-mult="10">x10</button>
                    </div>
                </div>

                <div class="error-message hidden" id="baccaratError"></div>
                <button class="play-btn" id="baccaratPlayBtn">СДЕЛАТЬ СТАВКУ</button>
            </div>

            <div id="roulette-game">
                <div class="game-header">
                    <div>
                        <div class="game-title">Roulette</div>
                        <div class="game-desc" id="rouletteDesc">Угадай число и выиграй</div>
                    </div>
                </div>

                <div class="roulette-wheel">
                    <div class="wheel-pointer"></div>
                    <div class="wheel" id="wheel"></div>
                    <div class="roulette-number" id="rouletteNumber">?</div>
                </div>

                <div class="roulette-bets" id="rouletteBets">
                    <button class="roulette-bet" data-bet="number">🎯 Число x50</button>
                    <button class="roulette-bet" data-bet="even">👥 Чет x2</button>
                    <button class="roulette-bet" data-bet="odd">👤 Нечет x2</button>
                </div>

                <div class="bet-controls">
                    <input type="number" class="bet-input" id="rouletteBet" value="10" min="1" step="1">
                    <div class="bet-multipliers">
                        <button class="bet-mult" data-mult="2">x2</button>
                        <button class="bet-mult" data-mult="5">x5</button>
                        <button class="bet-mult" data-mult="10">x10</button>
                    </div>
                </div>

                <div class="error-message hidden" id="rouletteError"></div>
                <button class="play-btn" id="roulettePlayBtn">КРУТИТЬ</button>
            </div>

            <div class="chat-section">
                <div class="chat-messages" id="chatMessages">
                    <div style="color: #8f9bb3; text-align: center; padding: 20px;">Пока пусто. Напишите первым!</div>
                </div>
                <div class="chat-input">
                    <input type="text" placeholder="Написать..." id="chatInput" maxlength="100">
                    <button id="sendChatBtn">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <div class="win-popup hidden" id="winPopup">+0$</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.enableClosingConfirmation();

        const urlParams = new URLSearchParams(window.location.search);
        const dataParam = urlParams.get('data');
        let userData = null;
        let gameSettings = {};

        if (dataParam) {
            try {
                userData = JSON.parse(decodeURIComponent(dataParam));
                gameSettings = userData.settings || {};
            } catch (e) {
                console.error('Error parsing user data', e);
            }
        }

        let balance = userData?.balance || 0;
        let userId = userData?.user_id || 0;
        let firstName = userData?.first_name || 'Игрок';

        document.getElementById('balanceAmount').textContent = balance.toFixed(2);
        document.getElementById('userName').textContent = firstName;
        
        let avatar = document.getElementById('userAvatar');
        avatar.textContent = firstName.charAt(0).toUpperCase();

        for (let i = 0; i < 20; i++) {
            let particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (5 + Math.random() * 10) + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            document.getElementById('particles').appendChild(particle);
        }

        let currentGame = 'crash';
        let gameActive = false;
        let autoCashout = false;
        let crashMultiplier = 1.00;
        let crashInterval = null;
        let crashPoints = [];
        let minesRevealed = [];
        let minePositions = [];
        let minesBet = 0;
        let minesActive = false;

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentGame = tab.dataset.game;
                document.querySelectorAll('.game-container > div').forEach(game => game.classList.remove('active'));
                document.getElementById(`${currentGame}-game`).classList.add('active');
                
                if (currentGame === 'mines') initMines();
                if (currentGame === 'baccarat') updateBaccaratHistory();
                
                const settings = gameSettings[currentGame] || { win_rate: 40, min_bet: 1, max_bet: 1000 };
                const desc = document.getElementById(`${currentGame}Desc`);
                if (desc) {
                    desc.textContent = `Win Rate: ${settings.win_rate}% • Мин: ${settings.min_bet}$ • Макс: ${settings.max_bet}$`;
                }
            });
        });

        document.getElementById('autoCashoutToggle').addEventListener('click', function() {
            autoCashout = !autoCashout;
            this.classList.toggle('active');
        });

        document.getElementById('crashPlayBtn').addEventListener('click', function() {
            if (gameActive) {
                cashout();
            } else {
                startCrash();
            }
        });

        function startCrash() {
            const bet = parseFloat(document.getElementById('crashBet').value);
            const settings = gameSettings.crash || { win_rate: 40, min_bet: 1, max_bet: 1000 };
            
            if (bet < settings.min_bet) {
                showError('crash', `Минимальная ставка ${settings.min_bet}$`);
                return;
            }
            if (bet > settings.max_bet) {
                showError('crash', `Максимальная ставка ${settings.max_bet}$`);
                return;
            }
            if (bet > balance) {
                showError('crash', 'Недостаточно средств!');
                return;
            }
            
            hideError('crash');
            balance -= bet;
            updateBalance();
            
            gameActive = true;
            crashMultiplier = 1.00;
            crashPoints = [{x: 0, y: 0}];
            document.getElementById('crashPlayBtn').textContent = 'ЗАБРАТЬ';
            
            let growth = 0.002;
            let shouldCrash = Math.random() * 100 > settings.win_rate;
            
            crashInterval = setInterval(() => {
                crashMultiplier += growth;
                growth *= 1.008;
                
                if (Math.random() < 0.01) {
                    growth *= 1.5;
                }
                
                document.getElementById('crashMultiplier').innerHTML = `${crashMultiplier.toFixed(2)}<small>x</small>`;
                document.getElementById('crashProgress').style.width = `${Math.min(crashMultiplier * 10, 100)}%`;
                
                crashPoints.push({x: crashPoints.length, y: crashMultiplier});
                if (crashPoints.length > 50) crashPoints.shift();
                updateCrashGraph();
                
                if (autoCashout && crashMultiplier >= 2.0) {
                    cashout();
                }
                
                if (shouldCrash && Math.random() < 0.0015) {
                    crashGame();
                }
            }, 50);
        }

        function updateCrashGraph() {
            const width = 400;
            const height = 120;
            
            if (crashPoints.length < 2) return;
            
            let maxY = Math.max(...crashPoints.map(p => p.y), 5);
            let pathData = '';
            
            for (let i = 0; i < crashPoints.length; i++) {
                const x = (i / (crashPoints.length - 1)) * width;
                const y = height - (crashPoints[i].y / maxY) * height * 0.8;
                
                if (i === 0) {
                    pathData += `M${x},${y}`;
                } else {
                    pathData += ` L${x},${y}`;
                }
            }
            
            document.getElementById('graphPath').setAttribute('d', pathData);
            
            const lastPoint = crashPoints[crashPoints.length - 1];
            const lastX = width;
            const lastY = height - (lastPoint.y / maxY) * height * 0.8;
            
            const point = document.getElementById('graphPoint');
            point.style.left = lastX + 'px';
            point.style.bottom = lastY + 'px';
        }

        function cashout() {
            if (!gameActive) return;
            clearInterval(crashInterval);
            
            const bet = parseFloat(document.getElementById('crashBet').value);
            const win = bet * crashMultiplier;
            balance += win;
            updateBalance();
            
            document.getElementById('crashPlayBtn').textContent = 'СТАВИТЬ';
            gameActive = false;
            
            showWinPopup(win);
            sendGameResult('crash', bet, win);
        }

        function crashGame() {
            clearInterval(crashInterval);
            document.getElementById('crashPlayBtn').textContent = 'СТАВИТЬ';
            gameActive = false;
            
            const bet = parseFloat(document.getElementById('crashBet').value);
            sendGameResult('crash', bet, 0);
        }

        function initMines() {
            const grid = document.getElementById('minesGrid');
            grid.innerHTML = '';
            minesRevealed = new Array(25).fill(false);
            minePositions = [];
            
            for (let i = 0; i < 5; i++) {
                minePositions.push(Math.floor(Math.random() * 25));
            }
            
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'mine-cell';
                cell.dataset.index = i;
                cell.onclick = () => revealMine(i);
                grid.appendChild(cell);
            }
            
            minesActive = false;
            document.getElementById('minesCashoutBtn').classList.add('hidden');
        }

        document.getElementById('minesPlayBtn').addEventListener('click', function() {
            const bet = parseFloat(document.getElementById('minesBet').value);
            const settings = gameSettings.mines || { win_rate: 40, min_bet: 1, max_bet: 500 };
            
            if (bet < settings.min_bet) {
                showError('mines', `Минимальная ставка ${settings.min_bet}$`);
                return;
            }
            if (bet > settings.max_bet) {
                showError('mines', `Максимальная ставка ${settings.max_bet}$`);
                return;
            }
            if (bet > balance) {
                showError('mines', 'Недостаточно средств!');
                return;
            }
            
            hideError('mines');
            
            minesBet = bet;
            minesActive = true;
            minesRevealed = new Array(25).fill(false);
            minePositions = [];
            
            for (let i = 0; i < 5; i++) {
                minePositions.push(Math.floor(Math.random() * 25));
            }
            
            const grid = document.getElementById('minesGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'mine-cell';
                cell.dataset.index = i;
                cell.onclick = () => revealMine(i);
                grid.appendChild(cell);
            }
            
            balance -= bet;
            updateBalance();
            
            document.getElementById('minesPlayBtn').classList.add('hidden');
            document.getElementById('minesCashoutBtn').classList.remove('hidden');
        });

        document.getElementById('minesCashoutBtn').addEventListener('click', function() {
            if (!minesActive) return;
            
            const revealedCount = minesRevealed.filter(r => r).length;
            if (revealedCount === 0) {
                showError('mines', 'Сначала откройте клетку!');
                return;
            }
            
            const win = minesBet * (1 + revealedCount * 0.3);
            
            balance += win;
            updateBalance();
            
            minesActive = false;
            document.getElementById('minesPlayBtn').classList.remove('hidden');
            document.getElementById('minesCashoutBtn').classList.add('hidden');
            
            showWinPopup(win);
            sendGameResult('mines', minesBet, win);
            
            initMines();
        });

        function revealMine(index) {
            if (!minesActive || minesRevealed[index]) return;
            
            const settings = gameSettings.mines || { win_rate: 40 };
            const cell = document.querySelector(`[data-index="${index}"]`);
            minesRevealed[index] = true;
            
            if (minePositions.includes(index)) {
                cell.classList.add('revealed', 'mine');
                
                for (let i = 0; i < 25; i++) {
                    if (minePositions.includes(i)) {
                        const mineCell = document.querySelector(`[data-index="${i}"]`);
                        if (mineCell) mineCell.classList.add('revealed', 'mine');
                    }
                }
                
                minesActive = false;
                document.getElementById('minesPlayBtn').classList.remove('hidden');
                document.getElementById('minesCashoutBtn').classList.add('hidden');
                
                sendGameResult('mines', minesBet, 0);
            } else {
                cell.classList.add('revealed');
            }
        }

        function updateBaccaratHistory() {
            const history = document.getElementById('baccaratHistory');
            history.innerHTML = '';
            
            for (let i = 0; i < 8; i++) {
                const item = document.createElement('div');
                item.className = 'history-item';
                
                const rand = Math.random();
                if (rand < 0.45) {
                    item.classList.add('player');
                    item.textContent = '👤';
                } else if (rand < 0.9) {
                    item.classList.add('banker');
                    item.textContent = '🏦';
                } else {
                    item.classList.add('tie');
                    item.textContent = '🤝';
                }
                
                history.appendChild(item);
            }
        }

        document.querySelectorAll('.bet-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.bet-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        document.getElementById('baccaratPlayBtn').addEventListener('click', function() {
            const selected = document.querySelector('.bet-option.selected');
            if (!selected) {
                showError('baccarat', 'Выберите ставку!');
                return;
            }
            
            const bet = parseFloat(document.getElementById('baccaratBet').value);
            const settings = gameSettings.baccarat || { win_rate: 40, min_bet: 1, max_bet: 500 };
            
            if (bet < settings.min_bet) {
                showError('baccarat', `Минимальная ставка ${settings.min_bet}$`);
                return;
            }
            if (bet > settings.max_bet) {
                showError('baccarat', `Максимальная ставка ${settings.max_bet}$`);
                return;
            }
            if (bet > balance) {
                showError('baccarat', 'Недостаточно средств!');
                return;
            }
            
            hideError('baccarat');
            balance -= bet;
            updateBalance();
            
            const rand = Math.random() * 100;
            let win = false;
            let multiplier = parseFloat(selected.dataset.coeff);
            
            if (rand < settings.win_rate) {
                if (selected.dataset.bet === 'player') win = true;
                else if (selected.dataset.bet === 'banker') win = true;
                else if (selected.dataset.bet === 'tie' && rand < 10) win = true;
                else if (selected.dataset.bet === 'playerPair' && rand < 5) win = true;
            }
            
            let winAmount = 0;
            if (win) {
                winAmount = bet * multiplier;
                balance += winAmount;
                updateBalance();
                showWinPopup(winAmount);
            }
            
            updateBaccaratHistory();
            sendGameResult('baccarat', bet, winAmount);
        });

        let rouletteSelected = 'number';
        document.querySelectorAll('.roulette-bet').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.roulette-bet').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                rouletteSelected = this.dataset.bet;
            });
        });

        document.getElementById('roulettePlayBtn').addEventListener('click', function() {
            const bet = parseFloat(document.getElementById('rouletteBet').value);
            const settings = gameSettings.roulette || { win_rate: 35, min_bet: 1, max_bet: 200 };
            
            if (bet < settings.min_bet) {
                showError('roulette', `Минимальная ставка ${settings.min_bet}$`);
                return;
            }
            if (bet > settings.max_bet) {
                showError('roulette', `Максимальная ставка ${settings.max_bet}$`);
                return;
            }
            if (bet > balance) {
                showError('roulette', 'Недостаточно средств!');
                return;
            }
            
            hideError('roulette');
            balance -= bet;
            updateBalance();
            
            const wheel = document.getElementById('wheel');
            const spin = 1800 + Math.random() * 720;
            wheel.style.transform = `rotate(${spin}deg)`;
            
            setTimeout(() => {
                const result = Math.floor(Math.random() * 100) + 1;
                document.getElementById('rouletteNumber').textContent = result;
                
                let win = false;
                let multiplier = 0;
                
                if (rouletteSelected === 'number') {
                    win = Math.random() * 100 < 2;
                    multiplier = 50;
                } else if (rouletteSelected === 'even') {
                    win = result % 2 === 0 && Math.random() * 100 < settings.win_rate;
                    multiplier = 2;
                } else {
                    win = result % 2 === 1 && Math.random() * 100 < settings.win_rate;
                    multiplier = 2;
                }
                
                let winAmount = 0;
                if (win) {
                    winAmount = bet * multiplier;
                    balance += winAmount;
                    updateBalance();
                    showWinPopup(winAmount);
                }
                
                sendGameResult('roulette', bet, winAmount);
            }, 3000);
        });

        document.getElementById('sendChatBtn').addEventListener('click', function() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message';
            msgDiv.innerHTML = `<b>${firstName}:</b> ${message}`;
            
            const chat = document.getElementById('chatMessages');
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
            
            tg.sendData(JSON.stringify({
                action: 'chat_message',
                message: message
            }));
            
            input.value = '';
            
            if (chat.children.length > 20) {
                chat.removeChild(chat.children[0]);
            }
        });

        document.getElementById('chatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('sendChatBtn').click();
            }
        });

        document.querySelectorAll('.bet-mult').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const mult = parseFloat(this.dataset.mult);
                const input = this.closest('.bet-controls').querySelector('.bet-input');
                if (input) {
                    let val = parseFloat(input.value) * mult;
                    input.value = Math.max(1, Math.floor(val));
                }
            });
        });

        function showError(game, message) {
            const errorEl = document.getElementById(game + 'Error');
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.classList.remove('hidden');
                setTimeout(() => hideError(game), 3000);
            }
        }

        function hideError(game) {
            const errorEl = document.getElementById(game + 'Error');
            if (errorEl) errorEl.classList.add('hidden');
        }

        function showWinPopup(amount) {
            const popup = document.getElementById('winPopup');
            popup.textContent = `+${amount.toFixed(2)}$`;
            popup.classList.remove('hidden');
            
            for (let i = 0; i < 20; i++) {
                setTimeout(() => createConfetti(), i * 50);
            }
            
            setTimeout(() => {
                popup.classList.add('hidden');
            }, 2000);
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
            confetti.style.width = (5 + Math.random() * 10) + 'px';
            confetti.style.height = confetti.style.width;
            confetti.style.animationDuration = (2 + Math.random() * 3) + 's';
            document.body.appendChild(confetti);
            
            setTimeout(() => confetti.remove(), 5000);
        }

        function sendGameResult(game, bet, win) {
            tg.sendData(JSON.stringify({
                action: 'game_result',
                game: game,
                bet: bet,
                win: win
            }));
            
            if (win > bet) {
                tg.HapticFeedback.notification('success');
            } else if (win === 0 && bet > 0) {
                tg.HapticFeedback.notification('error');
            }
        }

        function updateBalance() {
            document.getElementById('balanceAmount').textContent = balance.toFixed(2);
        }

        initMines();
        updateBaccaratHistory();

        tg.onEvent('mainButtonClicked', () => tg.close());
    </script>
</body>
</html>
