<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Big Money</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0c0f;
            --card: #14181f;
            --element: #1e232c;
            --accent: #ffd966;
            --accent-dark: #c5a53c;
            --glow: rgba(255, 217, 102, 0.2);
            --text: #ffffff;
            --text2: #8f9bb3;
            --border: #2a313c;
            --success: #4caf50;
            --danger: #f44336;
            --gold: #ffaa00;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        .app {
            max-width: 480px;
            width: 100%;
            background: var(--bg);
            border-radius: 32px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text2);
            font-size: 24px;
            width: 40px;
            height: 40px;
            cursor: pointer;
        }

        .logo {
            font-weight: 700;
            font-size: 20px;
            color: var(--accent);
        }

        .balance {
            background: var(--element);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: var(--card);
            margin: 12px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ffaa33);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #000;
        }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 0 20px 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tab {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
        }

        .tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        .game-container {
            padding: 0 20px 20px;
        }

        .game-header {
            margin-bottom: 16px;
        }

        .game-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
        }

        .canvas-container {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            position: relative;
            height: 250px;
        }

        .multiplier {
            font-size: 48px;
            font-weight: 900;
            text-align: center;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .graph-container {
            position: relative;
            height: 120px;
            width: 100%;
            overflow: hidden;
        }

        .graph-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--accent);
            stroke-width: 3;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .graph-point {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--accent);
            transform: translate(-50%, -50%);
        }

        .progress-bar {
            width: 50%;
            height: 4px;
            background: var(--element);
            border-radius: 2px;
            margin: 10px auto 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s;
        }

        .auto-cashout {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--element);
            padding: 12px 16px;
            border-radius: 16px;
            margin: 16px 0;
        }

        .auto-input {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            color: white;
            width: 100px;
            text-align: center;
        }

        .toggle-switch {
            width: 50px;
            height: 28px;
            background: var(--card);
            border-radius: 40px;
            position: relative;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .toggle-switch.active {
            background: var(--accent);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .toggle-switch.active::after {
            left: 24px;
        }

        .bet-controls {
            display: flex;
            gap: 12px;
            margin: 16px 0;
        }

        .bet-input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            color: white;
            font-size: 16px;
        }

        .bet-multipliers {
            display: flex;
            gap: 8px;
        }

        .bet-mult {
            background: var(--element);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .play-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            border: none;
            color: #000;
            font-weight: 700;
            font-size: 18px;
            padding: 16px;
            border-radius: 40px;
            cursor: pointer;
            margin: 8px 0;
        }

        .play-btn.small {
            padding: 12px;
            font-size: 14px;
        }

        .play-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .mines-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 20px 0;
        }

        .mine-cell {
            aspect-ratio: 1;
            background: var(--element);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }

        .mine-cell::before {
            content: '?';
            color: var(--text2);
        }

        .mine-cell:hover {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .mine-cell.revealed {
            background: var(--card);
        }

        .mine-cell.revealed::before {
            content: '●';
            color: var(--success);
            font-size: 32px;
        }

        .mine-cell.mine.revealed {
            background: rgba(244,67,54,0.2);
        }

        .mine-cell.mine.revealed::before {
            content: '💣';
            color: var(--danger);
        }

        .baccarat-history {
            display: flex;
            gap: 8px;
            margin: 16px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .history-item {
            width: 40px;
            height: 40px;
            background: var(--element);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .history-item.player { background: var(--success); }
        .history-item.banker { background: var(--danger); }
        .history-item.tie { background: var(--gold); }

        .bet-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .bet-option {
            background: var(--element);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
        }

        .bet-option.selected {
            border-color: var(--accent);
            background: var(--glow);
        }

        .bet-option .coeff {
            color: var(--accent);
            font-weight: 700;
            font-size: 20px;
        }

        .slot-machine {
            background: var(--card);
            border-radius: 24px;
            padding: 30px 20px;
            margin: 20px 0;
            border: 2px solid var(--accent);
            position: relative;
            overflow: hidden;
        }

        .slot-window {
            background: #000;
            border-radius: 20px;
            padding: 20px;
            border: 3px solid var(--accent);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        .slot-reel-container {
            position: relative;
            height: 120px;
            overflow: hidden;
            border-radius: 16px;
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            border: 2px solid var(--border);
        }

        .slot-reel {
            position: absolute;
            width: 100%;
            transition: top 3s cubic-bezier(0.2, 0.8, 0.3, 1);
            will-change: top;
        }

        .slot-item {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
            border-bottom: 1px solid var(--border);
        }

        .slot-item.small {
            color: var(--text2);
            font-size: 48px;
        }

        .slot-item.medium {
            color: var(--gold);
        }

        .slot-item.big {
            color: var(--danger);
            font-size: 72px;
        }

        .slot-item.jackpot {
            color: var(--accent);
            font-size: 80px;
            animation: jackpot 1s infinite;
        }

        @keyframes jackpot {
            0%,100% { text-shadow: 0 0 30px var(--accent); transform: scale(1); }
            50% { text-shadow: 0 0 60px var(--accent); transform: scale(1.1); }
        }

        .slot-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                transparent 0%,
                rgba(255,217,102,0.1) 45%,
                rgba(255,217,102,0.3) 50%,
                rgba(255,217,102,0.1) 55%,
                transparent 100%
            );
            pointer-events: none;
            animation: glowMove 2s infinite;
        }

        @keyframes glowMove {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .slot-result {
            text-align: center;
            margin-top: 20px;
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
            animation: resultPop 0.5s;
        }

        @keyframes resultPop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .slot-values {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text2);
        }

        .slot-values span {
            background: var(--element);
            padding: 4px 8px;
            border-radius: 8px;
        }

        .chat-section {
            margin-top: 20px;
            background: var(--card);
            border-radius: 24px;
            padding: 16px;
        }

        .chat-messages {
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .chat-message {
            background: var(--element);
            padding: 10px 14px;
            border-radius: 18px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .chat-input {
            display: flex;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            background: var(--element);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 12px;
            color: white;
        }

        .chat-input button {
            background: var(--accent);
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }

        .error-message {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid var(--danger);
            border-radius: 16px;
            padding: 12px;
            margin: 10px 0;
            color: var(--danger);
            text-align: center;
        }

        .win-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, var(--accent), var(--gold));
            color: #000;
            padding: 30px 50px;
            border-radius: 30px;
            font-size: 48px;
            font-weight: 900;
            z-index: 1000;
            animation: pop 1s;
            box-shadow: 0 0 100px var(--accent);
            border: 2px solid white;
        }

        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="back-btn" onclick="window.history.back()">←</div>
            <div class="logo">BIG MONEY</div>
            <div class="balance" id="balanceDisplay">
                <span id="balanceAmount">0.00</span>
            </div>
        </div>

        <div class="user-info">
            <div class="avatar" id="userAvatar">👤</div>
            <div id="userName">Игрок</div>
        </div>

        <div class="tabs" id="gameTabs">
            <button class="tab active" data-game="crash">CRASH</button>
            <button class="tab" data-game="mines">MINES</button>
            <button class="tab" data-game="baccarat">BACCARAT</button>
            <button class="tab" data-game="slot">SLOT</button>
        </div>

        <div class="game-container">
            <div id="crash-game" class="active">
                <div class="game-header">
                    <div class="game-title">CRASH</div>
                </div>

                <div class="canvas-container">
                    <div class="multiplier" id="crashMultiplier">1.00x</div>
                    <div class="graph-container">
                        <svg class="graph-line" viewBox="0 0 400 120">
                            <path id="graphPath" d="M0 120 L400 120" stroke="var(--accent)" stroke-width="3" fill="none"/>
                        </svg>
                        <div class="graph-point" id="graphPoint" style="left: 0%; bottom: 0%;"></div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="crashProgress" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="auto-cashout">
                    <span>🎯 Автовывод</span>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="number" class="auto-input" id="autoValue" value="2.0" step="0.5" min="1.1" max="100">
                        <div class="toggle-switch" id="autoCashoutToggle"></div>
                    </div>
                </div>

                <div class="bet-controls">
                    <input type="number" class="bet-input" id="crashBet" value="10" min="1" step="1">
                    <div class="bet-multipliers">
                        <button class="bet-mult" data-mult="2">x2</button>
                        <button class="bet-mult" data-mult="5">x5</button>
                        <button class="bet-mult" data-mult="10">x10</button>
                    </div>
                </div>

                <div class="error-message hidden" id="crashError"></div>
                <button class="play-btn" id="crashPlayBtn">СТАВИТЬ</button>
            </div>

            <div id="mines-game">
                <div class="game-header">
                    <div class="game-title">MINES</div>
                </div>

                <div class="mines-grid" id="minesGrid"></div>

                <div class="bet-controls">
                    <input type="number" class="bet-input" id="minesBet" value="10" min="1" step="1">
                    <div class="bet-multipliers">
                        <button class="bet-mult" data-mult="2">x2</button>
                        <button class="bet-mult" data-mult="5">x5</button>
                        <button class="bet-mult" data-mult="10">x10</button>
                    </div>
                </div>

                <div class="error-message hidden" id="minesError"></div>
                <button class="play-btn" id="minesPlayBtn">СДЕЛАТЬ СТАВКУ</button>
                <button class="play-btn small hidden" id="minesCashoutBtn">💰 ЗАБРАТЬ ВЫИГРЫШ</button>
            </div>

            <div id="baccarat-game">
                <div class="game-header">
                    <div class="game-title">BACCARAT</div>
                </div>

                <div class="baccarat-history" id="baccaratHistory"></div>

                <div class="bet-options" id="baccaratBets">
                    <div class="bet-option" data-bet="player" data-coeff="2">
                        <div>👤 Игрок</div>
                        <div class="coeff">x2</div>
                    </div>
                    <div class="bet-option" data-bet="banker" data-coeff="1.95">
                        <div>🏦 Банкир</div>
                        <div class="coeff">x1.95</div>
                    </div>
                    <div class="bet-option" data-bet="tie" data-coeff="8">
                        <div>🤝 Ничья</div>
                        <div class="coeff">x8</div>
                    </div>
                    <div class="bet-option" data-bet="playerPair" data-coeff="11">
                        <div>👥 Пара</div>
                        <div class="coeff">x11</div>
                    </div>
                </div>

                <div class="bet-controls">
                    <input type="number" class="bet-input" id="baccaratBet" value="10" min="1" step="1">
                    <div class="bet-multipliers">
                        <button class="bet-mult" data-mult="2">x2</button>
                        <button class="bet-mult" data-mult="5">x5</button>
                        <button class="bet-mult" data-mult="10">x10</button>
                    </div>
                </div>

                <div class="error-message hidden" id="baccaratError"></div>
                <button class="play-btn" id="baccaratPlayBtn">СДЕЛАТЬ СТАВКУ</button>
            </div>

            <div id="slot-game">
                <div class="game-header">
                    <div class="game-title">SLOT</div>
                </div>

                <div class="slot-machine">
                    <div class="slot-window">
                        <div class="slot-reel-container" id="slotContainer">
                            <div class="slot-reel" id="slotReel">
                                <!-- Тут будут генерироваться элементы -->
                            </div>
                            <div class="slot-glow"></div>
                        </div>
                    </div>
                    <div class="slot-result" id="slotResult">?</div>
                    <div class="slot-values" id="slotValues"></div>
                </div>

                <div class="bet-controls">
                    <input type="number" class="bet-input" id="slotBet" value="10" min="1" step="1">
                    <div class="bet-multipliers">
                        <button class="bet-mult" data-mult="2">x2</button>
                        <button class="bet-mult" data-mult="5">x5</button>
                        <button class="bet-mult" data-mult="10">x10</button>
                    </div>
                </div>

                <div class="error-message hidden" id="slotError"></div>
                <button class="play-btn" id="slotPlayBtn">КРУТИТЬ</button>
            </div>

            <div class="chat-section">
                <div class="chat-messages" id="chatMessages">
                    <div style="color: var(--text2); text-align: center; padding: 20px;">Чат пуст</div>
                </div>
                <div class="chat-input">
                    <input type="text" placeholder="Сообщение..." id="chatInput" maxlength="100">
                    <button id="sendChatBtn">→</button>
                </div>
            </div>
        </div>
    </div>

    <div class="win-popup hidden" id="winPopup">+0$</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const urlParams = new URLSearchParams(window.location.search);
        const dataParam = urlParams.get('data');
        let userData = null;
        let gameSettings = {};

        if (dataParam) {
            try {
                userData = JSON.parse(decodeURIComponent(dataParam));
                gameSettings = userData.settings || {};
            } catch (e) {}
        }

        let balance = userData?.balance || 0;
        let userId = userData?.user_id || 0;
        let firstName = userData?.first_name || 'Игрок';

        document.getElementById('balanceAmount').textContent = balance.toFixed(2);
        document.getElementById('userName').textContent = firstName;
        document.getElementById('userAvatar').textContent = firstName.charAt(0).toUpperCase();

        let currentGame = 'crash';
        let gameActive = false;
        let autoCashout = false;
        let crashMultiplier = 1.00;
        let crashInterval = null;
        let crashPoints = [];

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentGame = tab.dataset.game;
                document.querySelectorAll('.game-container > div').forEach(g => g.classList.remove('active'));
                document.getElementById(`${currentGame}-game`).classList.add('active');
                
                if (currentGame === 'mines') initMines();
                if (currentGame === 'baccarat') updateBaccaratHistory();
                if (currentGame === 'slot') initSlot();
            });
        });

        // CRASH
        document.getElementById('autoCashoutToggle').addEventListener('click', function() {
            autoCashout = !autoCashout;
            this.classList.toggle('active');
        });

        document.getElementById('crashPlayBtn').addEventListener('click', function() {
            if (gameActive) {
                cashout();
            } else {
                startCrash();
            }
        });

        function startCrash() {
            const bet = parseFloat(document.getElementById('crashBet').value);
            const settings = gameSettings.crash || { win_rate: 30, min_bet: 1, max_bet: 1000 };
            
            if (bet < settings.min_bet || bet > settings.max_bet || bet > balance) {
                showError('crash', 'Ставка недопустима');
                return;
            }
            
            balance -= bet;
            updateBalance();
            
            gameActive = true;
            crashMultiplier = 1.00;
            crashPoints = [{x:0,y:0}];
            document.getElementById('crashPlayBtn').textContent = 'ЗАБРАТЬ';
            
            let growth = 0.002;
            let maxMultiplier = 100;
            let shouldCrash = Math.random() * 100 > settings.win_rate;
            
            crashInterval = setInterval(() => {
                crashMultiplier += growth;
                growth *= 1.008;
                
                if (Math.random() < 0.005) growth *= 1.5;
                
                document.getElementById('crashMultiplier').innerHTML = crashMultiplier.toFixed(2) + 'x';
                document.getElementById('crashProgress').style.width = (crashMultiplier / maxMultiplier * 100) + '%';
                
                crashPoints.push({x: crashPoints.length, y: crashMultiplier});
                if (crashPoints.length > 50) crashPoints.shift();
                updateCrashGraph();
                
                const autoVal = parseFloat(document.getElementById('autoValue').value);
                if (autoCashout && crashMultiplier >= autoVal) {
                    cashout();
                }
                
                if (shouldCrash && crashMultiplier > 1.5 && Math.random() < 0.002) {
                    crashGame();
                }
                
                if (crashMultiplier >= maxMultiplier) {
                    cashout();
                }
            }, 50);
        }

        function updateCrashGraph() {
            const width = 400, height = 120;
            if (crashPoints.length < 2) return;
            
            let maxY = Math.max(...crashPoints.map(p => p.y), 5);
            let path = '';
            
            for (let i = 0; i < crashPoints.length; i++) {
                let x = (i / (crashPoints.length - 1)) * width;
                let y = height - (crashPoints[i].y / maxY) * height * 0.8;
                path += (i === 0 ? `M${x},${y}` : ` L${x},${y}`);
            }
            
            document.getElementById('graphPath').setAttribute('d', path);
            
            let last = crashPoints[crashPoints.length-1];
            let lastY = height - (last.y / maxY) * height * 0.8;
            let point = document.getElementById('graphPoint');
            point.style.left = width + 'px';
            point.style.bottom = lastY + 'px';
        }

        function cashout() {
            if (!gameActive) return;
            clearInterval(crashInterval);
            
            const bet = parseFloat(document.getElementById('crashBet').value);
            const win = bet * crashMultiplier;
            balance += win;
            updateBalance();
            
            document.getElementById('crashPlayBtn').textContent = 'СТАВИТЬ';
            gameActive = false;
            
            showWinPopup(win);
            sendGameResult('crash', bet, win);
        }

        function crashGame() {
            clearInterval(crashInterval);
            document.getElementById('crashPlayBtn').textContent = 'СТАВИТЬ';
            gameActive = false;
            
            const bet = parseFloat(document.getElementById('crashBet').value);
            sendGameResult('crash', bet, 0);
        }

        // MINES
        let minesRevealed = [];
        let minePositions = [];
        let minesBet = 0;
        let minesActive = false;

        function initMines() {
            const grid = document.getElementById('minesGrid');
            grid.innerHTML = '';
            minesRevealed = new Array(25).fill(false);
            minePositions = [];
            
            for (let i = 0; i < 5; i++) {
                minePositions.push(Math.floor(Math.random() * 25));
            }
            
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'mine-cell';
                cell.dataset.index = i;
                cell.onclick = () => revealMine(i);
                grid.appendChild(cell);
            }
            
            minesActive = false;
            document.getElementById('minesCashoutBtn').classList.add('hidden');
        }

        document.getElementById('minesPlayBtn').addEventListener('click', function() {
            const bet = parseFloat(document.getElementById('minesBet').value);
            const settings = gameSettings.mines || { win_rate: 30, min_bet: 1, max_bet: 500 };
            
            if (bet < settings.min_bet || bet > settings.max_bet || bet > balance) {
                showError('mines', 'Ставка недопустима');
                return;
            }
            
            minesBet = bet;
            minesActive = true;
            minesRevealed = new Array(25).fill(false);
            minePositions = [];
            
            let mineCount = Math.floor(settings.win_rate / 10) + 3;
            
            for (let i = 0; i < mineCount; i++) {
                let pos;
                do {
                    pos = Math.floor(Math.random() * 25);
                } while (minePositions.includes(pos));
                minePositions.push(pos);
            }
            
            const grid = document.getElementById('minesGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'mine-cell';
                cell.dataset.index = i;
                cell.onclick = () => revealMine(i);
                grid.appendChild(cell);
            }
            
            balance -= bet;
            updateBalance();
            
            document.getElementById('minesPlayBtn').classList.add('hidden');
            document.getElementById('minesCashoutBtn').classList.remove('hidden');
        });

        document.getElementById('minesCashoutBtn').addEventListener('click', function() {
            if (!minesActive) return;
            
            let revealedCount = minesRevealed.filter(r => r).length;
            if (revealedCount === 0) {
                showError('mines', 'Откройте клетку');
                return;
            }
            
            let win = minesBet * (1 + revealedCount * 0.3);
            
            balance += win;
            updateBalance();
            
            minesActive = false;
            document.getElementById('minesPlayBtn').classList.remove('hidden');
            document.getElementById('minesCashoutBtn').classList.add('hidden');
            
            showWinPopup(win);
            sendGameResult('mines', minesBet, win);
            
            initMines();
        });

        function revealMine(index) {
            if (!minesActive || minesRevealed[index]) return;
            
            let cell = document.querySelector(`[data-index="${index}"]`);
            minesRevealed[index] = true;
            
            if (minePositions.includes(index)) {
                cell.classList.add('revealed', 'mine');
                
                minePositions.forEach(i => {
                    let c = document.querySelector(`[data-index="${i}"]`);
                    if (c) c.classList.add('revealed', 'mine');
                });
                
                minesActive = false;
                document.getElementById('minesPlayBtn').classList.remove('hidden');
                document.getElementById('minesCashoutBtn').classList.add('hidden');
                
                sendGameResult('mines', minesBet, 0);
            } else {
                cell.classList.add('revealed');
            }
        }

        // BACCARAT
        function updateBaccaratHistory() {
            let history = document.getElementById('baccaratHistory');
            history.innerHTML = '';
            
            for (let i = 0; i < 8; i++) {
                let item = document.createElement('div');
                item.className = 'history-item';
                
                let rand = Math.random();
                if (rand < 0.45) {
                    item.classList.add('player');
                    item.textContent = '👤';
                } else if (rand < 0.9) {
                    item.classList.add('banker');
                    item.textContent = '🏦';
                } else {
                    item.classList.add('tie');
                    item.textContent = '🤝';
                }
                
                history.appendChild(item);
            }
        }

        document.querySelectorAll('.bet-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.bet-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        document.getElementById('baccaratPlayBtn').addEventListener('click', function() {
            let selected = document.querySelector('.bet-option.selected');
            if (!selected) {
                showError('baccarat', 'Выберите ставку');
                return;
            }
            
            let bet = parseFloat(document.getElementById('baccaratBet').value);
            let settings = gameSettings.baccarat || { win_rate: 35, min_bet: 1, max_bet: 500 };
            
            if (bet < settings.min_bet || bet > settings.max_bet || bet > balance) {
                showError('baccarat', 'Ставка недопустима');
                return;
            }
            
            balance -= bet;
            updateBalance();
            
            let rand = Math.random() * 100;
            let win = false;
            let mult = parseFloat(selected.dataset.coeff);
            
            if (rand < settings.win_rate) {
                if (selected.dataset.bet === 'player') win = true;
                else if (selected.dataset.bet === 'banker') win = true;
                else if (selected.dataset.bet === 'tie' && rand < 10) win = true;
                else if (selected.dataset.bet === 'playerPair' && rand < 5) win = true;
            }
            
            let winAmount = 0;
            if (win) {
                winAmount = bet * mult;
                balance += winAmount;
                showWinPopup(winAmount);
            }
            
            updateBaccaratHistory();
            sendGameResult('baccarat', bet, winAmount);
        });

        // SLOT
        let slotValues = [0, 1, 2, 3, 4, 5, 10, 15, 20, 30, 40, 50, 60, 70, 80, 85, 90, 95, 100];
        
        function initSlot() {
            let reel = document.getElementById('slotReel');
            let html = '';
            
            for (let i = 0; i < 50; i++) {
                let val = slotValues[Math.floor(Math.random() * slotValues.length)];
                let cls = 'slot-item';
                if (val < 5) cls += ' small';
                else if (val < 20) cls += ' medium';
                else if (val < 50) cls += ' big';
                else if (val >= 95) cls += ' jackpot';
                
                html += `<div class="${cls}">${val}</div>`;
            }
            
            reel.innerHTML = html;
            
            let valuesHtml = '';
            slotValues.slice(0, 10).forEach(v => {
                valuesHtml += `<span>${v}</span>`;
            });
            document.getElementById('slotValues').innerHTML = valuesHtml;
        }

        document.getElementById('slotPlayBtn').addEventListener('click', function() {
            let bet = parseFloat(document.getElementById('slotBet').value);
            let settings = gameSettings.slot || { win_rate: 80, min_bet: 1, max_bet: 200 };
            
            if (bet < settings.min_bet || bet > settings.max_bet || bet > balance) {
                showError('slot', 'Ставка недопустима');
                return;
            }
            
            balance -= bet;
            updateBalance();
            
            let reel = document.getElementById('slotReel');
            let container = document.getElementById('slotContainer');
            let itemHeight = 120;
            let items = reel.children.length;
            
            let rand = Math.random() * 100;
            let result;
            
            if (rand < settings.win_rate) {
                let lowValues = slotValues.filter(v => v < 10);
                result = lowValues[Math.floor(Math.random() * lowValues.length)];
            } else {
                let highValues = slotValues.filter(v => v >= 10 && v < 95);
                if (highValues.length > 0 && Math.random() < 0.3) {
                    result = highValues[Math.floor(Math.random() * highValues.length)];
                } else {
                    result = 0;
                }
            }
            
            if (Math.random() < 0.01) result = 100;
            
            let targetIndex = -1;
            for (let i = 0; i < items; i++) {
                if (reel.children[i].textContent == result) {
                    targetIndex = i;
                    break;
                }
            }
            
            if (targetIndex === -1) targetIndex = Math.floor(Math.random() * items);
            
            let spins = 30 + Math.floor(Math.random() * 20);
            let finalPos = -(targetIndex * itemHeight) - (spins * items * itemHeight);
            
            reel.style.top = finalPos + 'px';
            
            setTimeout(() => {
                let winAmount = result * bet;
                
                if (winAmount > 0) {
                    balance += winAmount;
                    updateBalance();
                    showWinPopup(winAmount);
                }
                
                document.getElementById('slotResult').textContent = result;
                
                if (result === 100) {
                    document.getElementById('slotResult').style.color = 'var(--accent)';
                    document.getElementById('slotResult').style.animation = 'jackpot 0.5s infinite';
                }
                
                sendGameResult('slot', bet, winAmount);
                
                setTimeout(() => {
                    reel.style.transition = 'none';
                    reel.style.top = '0px';
                    setTimeout(() => {
                        reel.style.transition = 'top 3s cubic-bezier(0.2, 0.8, 0.3, 1)';
                    }, 50);
                }, 3000);
            }, 3000);
        });

        // CHAT
        document.getElementById('sendChatBtn').addEventListener('click', function() {
            let input = document.getElementById('chatInput');
            let msg = input.value.trim();
            if (!msg) return;
            
            let div = document.createElement('div');
            div.className = 'chat-message';
            div.innerHTML = `<b>${firstName}:</b> ${msg}`;
            
            let chat = document.getElementById('chatMessages');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            
            tg.sendData(JSON.stringify({
                action: 'chat_message',
                message: msg
            }));
            
            input.value = '';
        });

        document.getElementById('chatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('sendChatBtn').click();
        });

        // BET MULTIPLIERS
        document.querySelectorAll('.bet-mult').forEach(btn => {
            btn.addEventListener('click', function() {
                let mult = parseFloat(this.dataset.mult);
                let input = this.closest('.bet-controls').querySelector('.bet-input');
                if (input) {
                    let val = parseFloat(input.value) * mult;
                    input.value = Math.max(1, Math.floor(val));
                }
            });
        });

        // UTILS
        function showError(game, msg) {
            let err = document.getElementById(game + 'Error');
            if (err) {
                err.textContent = msg;
                err.classList.remove('hidden');
                setTimeout(() => hideError(game), 3000);
            }
        }

        function hideError(game) {
            let err = document.getElementById(game + 'Error');
            if (err) err.classList.add('hidden');
        }

        function showWinPopup(amount) {
            let popup = document.getElementById('winPopup');
            popup.textContent = `+${amount.toFixed(2)}$`;
            popup.classList.remove('hidden');
            
            setTimeout(() => popup.classList.add('hidden'), 2000);
        }

        function sendGameResult(game, bet, win) {
            tg.sendData(JSON.stringify({
                action: 'game_result',
                game: game,
                bet: bet,
                win: win
            }));
            
            if (win > bet) tg.HapticFeedback.notification('success');
            else if (win === 0 && bet > 0) tg.HapticFeedback.notification('error');
        }

        function updateBalance() {
            document.getElementById('balanceAmount').textContent = balance.toFixed(2);
        }

        initMines();
        updateBaccaratHistory();
        initSlot();
    </script>
</body>
</html>
