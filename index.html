<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Big Money Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0c0f;
            --card: #14181f;
            --element: #1e232c;
            --accent: #ffd966;
            --accent-dark: #c5a53c;
            --glow: rgba(255, 217, 102, 0.3);
            --text: #ffffff;
            --text2: #8f9bb3;
            --border: #2a313c;
            --success: #4caf50;
            --danger: #f44336;
            --gold: #ffaa00;
            --grid: rgba(255, 217, 102, 0.1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            position: relative;
        }

        .fire-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,217,102,0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: firePulse 3s infinite;
        }

        @keyframes firePulse {
            0%,100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .app {
            max-width: 480px;
            width: 100%;
            background: rgba(10,12,15,0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid var(--accent);
            overflow: hidden;
            box-shadow: 0 0 50px var(--glow);
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-weight: 700;
            font-size: 24px;
            background: linear-gradient(135deg, var(--accent), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: logoGlow 2s infinite;
        }

        @keyframes logoGlow {
            0%,100% { filter: drop-shadow(0 0 10px var(--accent)); }
            50% { filter: drop-shadow(0 0 20px var(--accent)); }
        }

        .balance {
            background: linear-gradient(135deg, var(--element), var(--card));
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 0 20px var(--glow);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: var(--card);
            margin: 12px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ffaa33);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: #000;
            box-shadow: 0 0 20px var(--accent);
        }

        .username {
            font-weight: 600;
            font-size: 16px;
        }

        .game-selector {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 20px 20px;
        }

        .game-card {
            background: linear-gradient(135deg, var(--card), var(--element));
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, var(--glow), transparent);
            animation: cardShine 3s infinite;
            pointer-events: none;
        }

        @keyframes cardShine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .game-card:hover {
            border-color: var(--accent);
            transform: scale(1.02);
            box-shadow: 0 0 30px var(--glow);
        }

        .game-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .game-card-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .game-card-desc {
            color: var(--text2);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .game-card-stats {
            display: flex;
            gap: 20px;
            color: var(--accent);
            font-size: 14px;
            font-weight: 600;
        }

        .game-container {
            padding: 0 20px 20px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .game-title {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titlePulse 1.5s infinite;
        }

        @keyframes titlePulse {
            0%,100% { filter: drop-shadow(0 0 10px var(--accent)); }
            50% { filter: drop-shadow(0 0 30px var(--accent)); }
        }

        .back-to-games {
            background: var(--element);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .back-to-games:hover {
            border-color: var(--accent);
        }

        .timer-container {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .timer-label {
            color: var(--text2);
            font-size: 16px;
            margin-bottom: 8px;
        }

        .timer-value {
            font-size: 72px;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent);
            line-height: 1;
            animation: timerPop 1s infinite;
        }

        @keyframes timerPop {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .canvas-container {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            position: relative;
            height: 300px;
        }

        .multiplier {
            font-size: 64px;
            font-weight: 900;
            text-align: center;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent);
            margin-bottom: 20px;
            animation: multiplierPulse 0.5s infinite;
        }

        @keyframes multiplierPulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .graph-container {
            position: relative;
            height: 180px;
            width: 100%;
            margin: 10px 0;
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 30px 30px;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .graph-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--accent);
            stroke-width: 4;
            filter: drop-shadow(0 0 15px var(--accent));
        }

        .graph-point {
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--accent);
            transform: translate(-50%, -50%);
            animation: pointGlow 0.5s infinite;
        }

        @keyframes pointGlow {
            0%,100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.3); }
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: var(--element);
            border-radius: 4px;
            margin: 16px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
            background-size: 200% 100%;
            width: 0%;
            transition: width 0.1s;
            animation: progressMove 2s infinite;
        }

        @keyframes progressMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        .history-container {
            margin: 16px 0;
            padding: 16px;
            background: var(--element);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .history-title {
            color: var(--text2);
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: 600;
        }

        .history-list {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .history-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 16px;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
            font-size: 16px;
            animation: historyPop 0.3s;
        }

        @keyframes historyPop {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .history-item.x10 { color: var(--success); font-size: 18px; border-color: var(--success); animation: pulse 1s infinite; }
        .history-item.x20 { color: var(--gold); font-size: 20px; border-color: var(--gold); animation: pulse 1s infinite; }
        .history-item.x50 { color: var(--danger); font-size: 22px; border-color: var(--danger); animation: bigWin 1s infinite; }

        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes bigWin {
            0%,100% { transform: scale(1); text-shadow: 0 0 10px var(--danger); }
            50% { transform: scale(1.1); text-shadow: 0 0 20px var(--danger); }
        }

        .auto-cashout {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--element);
            padding: 16px;
            border-radius: 16px;
            margin: 16px 0;
            border: 1px solid var(--border);
        }

        .auto-input {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            width: 100px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }

        .toggle-switch {
            width: 60px;
            height: 32px;
            background: var(--card);
            border-radius: 40px;
            position: relative;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .toggle-switch.active {
            background: var(--accent);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 28px;
            height: 28px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .toggle-switch.active::after {
            left: 30px;
        }

        .bet-controls {
            display: flex;
            gap: 12px;
            margin: 16px 0;
        }

        .bet-input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .bet-multipliers {
            display: flex;
            gap: 8px;
        }

        .bet-mult {
            background: var(--element);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .fixed-bet {
            background: var(--element);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            color: var(--accent);
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin: 16px 0;
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px var(--glow);
        }

        .play-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--gold));
            border: none;
            color: #000;
            font-weight: 800;
            font-size: 20px;
            padding: 18px;
            border-radius: 40px;
            cursor: pointer;
            margin: 8px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px var(--glow);
            transition: 0.3s;
        }

        .play-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: btnShine 3s infinite;
        }

        @keyframes btnShine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .chat-section {
            margin-top: 20px;
            background: var(--card);
            border-radius: 24px;
            padding: 16px;
        }

        .chat-messages {
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .chat-message {
            background: var(--element);
            padding: 12px 16px;
            border-radius: 18px;
            margin-bottom: 8px;
            font-size: 14px;
            border: 1px solid var(--border);
            animation: messagePop 0.3s;
        }

        @keyframes messagePop {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .chat-message .name {
            color: var(--accent);
            font-weight: 700;
            margin-right: 8px;
        }

        .chat-message .ad {
            color: var(--success);
            font-weight: 600;
        }

        .chat-message .profit {
            color: var(--gold);
            font-weight: 600;
        }

        .chat-input {
            display: flex;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            background: var(--element);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 14px;
            color: white;
            font-size: 14px;
        }

        .chat-input button {
            background: linear-gradient(135deg, var(--accent), var(--gold));
            border: none;
            border-radius: 40px;
            padding: 14px 24px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
        }

        .error-message {
            background: rgba(244,67,54,0.2);
            border: 1px solid var(--danger);
            border-radius: 16px;
            padding: 12px;
            margin: 10px 0;
            color: var(--danger);
            text-align: center;
            font-weight: 600;
            animation: errorShake 0.5s;
        }

        @keyframes errorShake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .win-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, var(--accent), var(--gold));
            color: #000;
            padding: 40px 70px;
            border-radius: 50px;
            font-size: 56px;
            font-weight: 900;
            z-index: 1000;
            animation: winPop 1.5s forwards;
            box-shadow: 0 0 100px var(--accent);
            border: 3px solid white;
            white-space: nowrap;
        }

        @keyframes winPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); }
            40% { transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -80%); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

            'Не везет сегодня', 'Отыграюсь ща', 'x2.3 норм', 'Кто на слоты?',
            '👑 ТГК С КЕФАМИ @BIGMONEY_VIP', '🔥 ВИП КАНАЛ @BIGMONEY_PROFIT', 
            '💎 СЕКРЕТНЫЕ КЕФЫ t.me/BIGMONEY_BETS', '🎯 ТОП ПРОГНОЗЫ @BIGMONEY_PREDICT',
            '⚡ ЗАХОДИ НА КАНАЛ @BIGMONEY_WINS', '💰 БЕСПЛАТНЫЕ КЕФЫ t.me/BIGMONEY_FREE',
            '📈 АНАЛИТИКА @BIGMONEY_ANALYSIS', '🎰 СТРАТЕГИИ @BIGMONEY_TIPS'
        ];

        function initChat() {
            let chat = document.getElementById('chatMessages');
            chat.innerHTML = '';
            
            for (let i = 0; i < 25; i++) {
                setTimeout(() => addRandomChatMessage(), i * 2000);
            }
            
            setInterval(addRandomChatMessage, 5000);
        }

        function addRandomChatMessage() {
            let name = chatNames[Math.floor(Math.random() * chatNames.length)];
            let msg = chatMessages[Math.floor(Math.random() * chatMessages.length)];
            let time = new Date().getHours() + ':' + String(new Date().getMinutes()).padStart(2,'0');
            
            let div = document.createElement('div');
            div.className = 'chat-message';
            
            if (msg.includes('@') || msg.includes('t.me')) {
                div.innerHTML = `<span class="name">${name}</span> <span class="ad">${msg}</span> <span style="color:var(--text2); float:right;">${time}</span>`;
            } else if (msg.includes('+') || msg.includes('x')) {
                div.innerHTML = `<span class="name">${name}</span> <span class="profit">${msg}</span> <span style="color:var(--text2); float:right;">${time}</span>`;
            } else {
                div.innerHTML = `<span class="name">${name}</span> ${msg} <span style="color:var(--text2); float:right;">${time}</span>`;
            }
            
            let chat = document.getElementById('chatMessages');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            
            if (chat.children.length > 30) {
                chat.removeChild(chat.children[0]);
            }
        }

        initChat();

        for (let i = 0; i < 30; i++) {
            if (i < 3) crashHistory.push((1.1 + Math.random() * 0.3).toFixed(2));
            else if (i < 8) crashHistory.push((1.2 + Math.random() * 0.5).toFixed(2));
            else if (i < 20) crashHistory.push((1.1 + Math.random() * 0.8).toFixed(2));
            else crashHistory.push((5 + Math.random() * 10).toFixed(2));
        }

        function showGameSelector() {
            document.getElementById('gameSelector').classList.remove('hidden');
            document.getElementById('gameContainer').classList.add('hidden');
            clearAllIntervals();
        }

        function selectGame(game) {
            currentGame = game;
            document.getElementById('gameSelector').classList.add('hidden');
            document.getElementById('gameContainer').classList.remove('hidden');
            document.getElementById('currentGameTitle').textContent = game.toUpperCase();
            
            if (game === 'crash') initCrash();
        }

        function clearAllIntervals() {
            if (crashInterval) clearInterval(crashInterval);
            if (timerInterval) clearInterval(timerInterval);
            gameActive = false;
            gameInProgress = false;
            cashoutUsed = false;
        }

        function initCrash() {
            updateCrashHistory();
            startCrashTimer();
        }

        function updateCrashHistory() {
            let historyList = document.getElementById('crashHistory');
            historyList.innerHTML = '';
            
            let recent = crashHistory.slice(-25);
            recent.forEach(x => {
                let item = document.createElement('div');
                item.className = 'history-item';
                if (x >= 3) item.classList.add('x10');
                if (x >= 5) item.classList.add('x20');
                if (x >= 8) item.classList.add('x50');
                item.textContent = x + 'x';
                historyList.appendChild(item);
            });
        }

        function startCrashTimer() {
            countdown = 10;
            document.getElementById('crashTimer').textContent = countdown;
            
            timerInterval = setInterval(() => {
                countdown--;
                document.getElementById('crashTimer').textContent = countdown;
                
                if (countdown <= 0) {
                    clearInterval(timerInterval);
                    startCrashGame();
                }
            }, 1000);
        }

        function startCrashGame() {
            if (gameInProgress) return;
            
            gameInProgress = true;
            cashoutUsed = false;
            
            let multiplier = 1.00;
            
            if (hasBet) {
                if (gamesPlayed < 2) {
                    if (Math.random() < 0.7) {
                        multiplier = 1.3 + Math.random() * 0.5;
                    } else {
                        multiplier = 1.1 + Math.random() * 0.2;
                    }
                } else {
                    let randomWin = Math.random() * 100;
                    if (randomWin < winRate) {
                        multiplier = 1.3 + Math.random() * 2.5;
                    } else {
                        multiplier = 1.1 + Math.random() * 0.2;
                    }
                }
            } else {
                let target = 2.0 + Math.random() * 2.0;
                let steps = 100;
                let step = 0;
                
                crashInterval = setInterval(() => {
                    step++;
                    multiplier = 1.0 + (target - 1.0) * (step / steps);
                    
                    updateCrashDisplay(multiplier);
                    
                    if (step >= steps) {
                        clearInterval(crashInterval);
                        crashHistory.push(multiplier.toFixed(2));
                        if (crashHistory.length > 30) crashHistory.shift();
                        updateCrashHistory();
                        gameInProgress = false;
                        startCrashTimer();
                    }
                }, 50);
                return;
            }
            
            if (hasBet && multiplier < 1.5) {
                let crashTime = 30 + Math.floor(Math.random() * 30);
                let step = 0;
                
                crashInterval = setInterval(() => {
                    step++;
                    multiplier = 1.0 + (multiplier - 1.0) * (step / crashTime);
                    
                    updateCrashDisplay(multiplier);
                    
                    if (step >= crashTime) {
                        clearInterval(crashInterval);
                        if (!cashoutUsed) {
                            crashHistory.push(multiplier.toFixed(2));
                            if (crashHistory.length > 30) crashHistory.shift();
                            updateCrashHistory();
                            sendGameResult('crash', currentBet, 0);
                            resetCrash();
                        }
                        return;
                    }
                    
                    if (hasBet) {
                        let autoVal = parseFloat(document.getElementById('autoValue').value);
                        if (autoCashout && multiplier >= autoVal && !cashoutUsed) {
                            crashCashout();
                        }
                    }
                }, 50);
            } else if (hasBet) {
                let target = multiplier;
                let steps = 100;
                let step = 0;
                
                crashInterval = setInterval(() => {
                    step++;
                    multiplier = 1.0 + (target - 1.0) * (step / steps);
                    
                    updateCrashDisplay(multiplier);
                    
                    if (step >= steps) {
                        clearInterval(crashInterval);
                        if (!cashoutUsed) {
                            crashCashout();
                        }
                        return;
                    }
                    
                    if (hasBet) {
                        let autoVal = parseFloat(document.getElementById('autoValue').value);
                        if (autoCashout && multiplier >= autoVal && !cashoutUsed) {
                            crashCashout();
                        }
                    }
                }, 50);
            }
        }

        function updateCrashDisplay(multiplier) {
            crashMultiplier = multiplier;
            document.getElementById('crashMultiplier').innerHTML = multiplier.toFixed(2) + 'x';
            
            let progress = (multiplier / 10) * 100;
            if (progress > 100) progress = 100;
            document.getElementById('crashProgress').style.width = progress + '%';
            
            crashPoints.push({x: crashPoints.length, y: multiplier});
            if (crashPoints.length > 50) crashPoints.shift();
            
            let width = 400, height = 180;
            if (crashPoints.length < 2) return;
            
            let maxY = Math.max(...crashPoints.map(p => p.y), 2);
            let path = '';
            
            for (let i = 0; i < crashPoints.length; i++) {
                let x = (i / (crashPoints.length - 1)) * width;
                let y = height - (crashPoints[i].y / maxY) * height * 0.9;
                path += (i === 0 ? `M${x},${y}` : ` L${x},${y}`);
            }
            
            document.getElementById('graphPath').setAttribute('d', path);
            
            let last = crashPoints[crashPoints.length-1];
            let lastY = height - (last.y / maxY) * height * 0.9;
            let point = document.getElementById('graphPoint');
            point.style.left = width + 'px';
            point.style.bottom = lastY + 'px';
        }

        document.getElementById('autoCashoutToggle').addEventListener('click', function() {
            autoCashout = !autoCashout;
            this.classList.toggle('active');
        });

        document.getElementById('crashPlayBtn').addEventListener('click', function() {
            if (gameInProgress && hasBet && !cashoutUsed) {
                crashCashout();
                return;
            }
            
            if (!gameInProgress) {
                let bet = parseFloat(document.getElementById('crashBet').value);
                
                if (bet > balance) {
                    showError('crash', 'Недостаточно средств!');
                    return;
                }
                
                balance -= bet;
                updateBalance();
                hasBet = true;
                currentBet = bet;
                gamesPlayed++;
                
                document.getElementById('crashPlayBtn').textContent = '💰 ЗАБРАТЬ';
                document.getElementById('crashPlayBtn').style.background = 'linear-gradient(135deg, #4caf50, #45a049)';
            }
        });

        function crashCashout() {
            if (!gameInProgress || !hasBet || cashoutUsed) return;
            
            cashoutUsed = true;
            clearInterval(crashInterval);
            
            let win = currentBet * crashMultiplier;
            balance += win;
            updateBalance();
            
            crashHistory.push(crashMultiplier.toFixed(2));
            if (crashHistory.length > 30) crashHistory.shift();
            updateCrashHistory();
            
            showWinPopup(win);
            sendGameResult('crash', currentBet, win);
            
            resetCrash();
        }

        function resetCrash() {
            gameInProgress = false;
            hasBet = false;
            currentBet = 0;
            cashoutUsed = false;
            document.getElementById('crashPlayBtn').textContent = '🔥 СДЕЛАТЬ СТАВКУ';
            document.getElementById('crashPlayBtn').style.background = '';
            document.getElementById('crashMultiplier').innerHTML = '1.00x';
            document.getElementById('crashProgress').style.width = '0%';
            document.getElementById('graphPath').setAttribute('d', 'M0 180 L400 180');
            
            startCrashTimer();
        }

        document.getElementById('sendChatBtn').addEventListener('click', function() {
            let input = document.getElementById('chatInput');
            let msg = input.value.trim();
            if (!msg) return;
            
            let div = document.createElement('div');
            div.className = 'chat-message';
            div.innerHTML = `<span class="name">${firstName}</span> ${msg}`;
            
            let chat = document.getElementById('chatMessages');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            
            tg.sendData(JSON.stringify({
                action: 'chat_message',
                message: msg
            }));
            
            input.value = '';
        });

        document.getElementById('chatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('sendChatBtn').click();
        });

        function showError(game, msg) {
            let err = document.getElementById(game + 'Error');
            if (err) {
                err.textContent = msg;
                err.classList.remove('hidden');
                setTimeout(() => hideError(game), 3000);
            }
        }

        function hideError(game) {
            let err = document.getElementById(game + 'Error');
            if (err) err.classList.add('hidden');
        }

        function showWinPopup(amount) {
            let popup = document.getElementById('winPopup');
            popup.textContent = `+${amount.toFixed(2)}$`;
            popup.classList.remove('hidden');
            
            setTimeout(() => popup.classList.add('hidden'), 2000);
        }

        function sendGameResult(game, bet, win) {
            tg.sendData(JSON.stringify({
                action: 'game_result',
                game: game,
                bet: bet,
                win: win
            }));
            
            if (win > bet) tg.HapticFeedback.notification('success');
            else if (win === 0 && bet > 0) tg.HapticFeedback.notification('error');
        }

        function updateBalance() {
            document.getElementById('balanceAmount').textContent = balance.toFixed(2);
        }
    </script>
</body>
</html>
